<!DOCTYPE html>
<html lang="ms">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>e-Sharing SK Pendidikan Khas Miri</title>
    <!-- Tailwind CSS CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;700;900&display=swap');
        body { font-family: 'Inter', sans-serif; }
        .line-clamp-3 {
            display: -webkit-box;
            -webkit-line-clamp: 3;
            -webkit-box-orient: vertical;  
            overflow: hidden;
        }
    </style>
</head>
<body class="bg-slate-50 text-slate-900">

    <!-- Top Bar -->
    <div class="h-2 bg-[#F6B93B] w-full"></div>

    <!-- Header -->
    <header class="bg-white border-b border-slate-200 sticky top-0 z-50 shadow-sm">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
            <div class="flex justify-between items-center h-20">
                <div class="flex items-center space-x-4">
                    <div class="p-1 bg-white rounded-lg shadow-sm border border-slate-100">
                        <img src="https://files.oaiusercontent.com/file-K1S68z6UshqXkXh3S6K2E8?se=2024-10-30T10%3A01%3A00Z&sp=r&sv=2024-08-04&sr=b&rscc=max-age%3D604800%2C%20immutable%2C%20private&rscd=attachment%3B%20filename%3Dlogo.jpg&sig=H%2B1K%2Bv09f0i8L5C2S/Y8Xp%2B%2B%2B9J6Q6J6z6Z6z6Z6z6Z6%3D" 
                             alt="Logo SKPK Miri" class="h-14 w-14 object-contain">
                    </div>
                    <div class="flex flex-col">
                        <h1 class="text-2xl font-black text-[#0A3D62] tracking-tight leading-none uppercase">e-Sharing</h1>
                        <div class="flex items-center mt-1 text-slate-500 font-bold uppercase tracking-widest text-[10px]">
                            <span class="h-[2px] w-4 bg-[#E74C3C] mr-2"></span>
                            SK Pendidikan Khas Miri
                        </div>
                    </div>
                </div>

                <!-- Desktop Nav -->
                <nav id="desktop-nav" class="hidden lg:flex items-center space-x-1">
                    <!-- Nav buttons will be injected here -->
                </nav>

                <div class="lg:hidden">
                    <button id="mobile-menu-btn" class="p-2 text-[#0A3D62]">
                        <i data-lucide="menu" size="28"></i>
                    </button>
                </div>
            </div>
        </div>
        <!-- Mobile Nav -->
        <div id="mobile-nav" class="hidden lg:hidden bg-white border-t border-slate-100 p-4 space-y-2 shadow-xl"></div>
    </header>

    <main class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-10">
        <!-- Billboard -->
        <section id="billboard" class="mb-12">
            <!-- Dynamic Billboard Content -->
        </section>

        <!-- Submenu Navigation -->
        <section class="mb-12">
            <div class="grid grid-cols-1 sm:grid-cols-3 gap-6" id="submenu-container">
                <!-- Submenu buttons injected here -->
            </div>
        </section>

        <!-- Search Bar -->
        <div class="relative mb-12">
            <i data-lucide="search" class="absolute left-5 top-1/2 -translate-y-1/2 text-slate-400" size="20"></i>
            <input type="text" id="search-input" placeholder="Cari hebahan dalam semua arkib..." 
                   class="w-full pl-14 pr-6 py-5 rounded-2xl bg-white border border-slate-100 shadow-sm focus:ring-2 focus:ring-[#0A3D62]/10 outline-none font-bold text-slate-700">
        </div>

        <!-- Documents Section -->
        <div class="space-y-6">
            <div class="flex items-center justify-between px-2 mb-2">
                <h3 class="font-black text-[#0A3D62] uppercase tracking-[0.1em] text-lg italic">ARKIB DOKUMEN DIGITAL</h3>
                <span id="doc-count" class="px-5 py-1.5 bg-[#F6B93B] rounded-full text-[10px] font-black text-[#0A3D62] shadow-sm">0 DOKUMEN</span>
            </div>
            <div id="document-grid" class="grid grid-cols-1 md:grid-cols-2 gap-8">
                <!-- Documents injected here -->
            </div>
        </div>
    </main>

    <!-- Footer -->
    <footer class="bg-[#0A3D62] py-16 mt-20 text-white text-center border-t-4 border-[#F6B93B]">
        <div class="max-w-7xl mx-auto px-4 flex flex-col items-center">
            <div class="bg-white p-2 rounded-2xl mb-6 shadow-2xl">
                <img src="https://files.oaiusercontent.com/file-K1S68z6UshqXkXh3S6K2E8?se=2024-10-30T10%3A01%3A00Z&sp=r&sv=2024-08-04&sr=b&rscc=max-age%3D604800%2C%20immutable%2C%20private&rscd=attachment%3B%20filename%3Dlogo.jpg&sig=H%2B1K%2Bv09f0i8L5C2S/Y8Xp%2B%2B%2B9J6Q6J6z6Z6z6Z6z6Z6%3D" 
                     alt="Logo" class="h-16 w-16">
            </div>
            <h4 class="text-xl font-black uppercase italic">e-Sharing SKPK Miri</h4>
            <p class="text-blue-100/50 text-xs font-bold mt-2">© 2024 SK Pendidikan Khas Miri • Bersatu Berdikari</p>
        </div>
    </footer>

    <script>
        // Data Dokumen
        const documents = [
            { id: 1, title: "Pekeliling Ikhtisas Bil. 5/2024 - Kurikulum Kebangsaan", source: "KPM", type: "Pekeliling/ SPI/PPSM", date: "2024-05-10T09:00:00", description: "Maklumat mengenai pelaksanaan kurikulum baharu di sekolah." },
            { id: 2, title: "Panduan Pengurusan MBPK", source: "BPKHAS", type: "Pekeliling/ SPI/PPSM", date: "2024-05-12T14:30:00", description: "Garis panduan terkini untuk pengurusan MBPK di peringkat sekolah." },
            { id: 3, title: "Minit Mesyuarat Dialog Prestasi PPD Miri", source: "PPD", type: "Minit Mesyuarat", date: "2024-05-13T10:15:00", description: "Keputusan dan tindakan susulan daripada dialog prestasi bersama PPD." },
            { id: 4, title: "Hebahan Cuti Peristiwa Negeri Sarawak", source: "JPN", type: "Lain-lain Hebahan", date: "2024-05-11T08:00:00", description: "Pengumuman cuti bagi sekolah-sekolah di bawah JPN Sarawak." },
            { id: 5, title: "Program Kebajikan Staf SKPK Miri", source: "LAIN-LAIN", type: "Lain-lain Hebahan", date: "2024-05-09T16:45:00", description: "Inisiatif terbaru kelab staf untuk ahli-ahli di SKPK Miri." },
            { id: 6, title: "Minit Mesyuarat Pengurusan SKPK Miri", source: "KPM", type: "Minit Mesyuarat", date: "2024-05-08T10:00:00", description: "Dapatan daripada taklimat pengurusan KPM." }
        ];

        const menuItems = ["Semua", "KPM", "BPKHAS", "JPN", "PPD", "LAIN-LAIN"];
        const subMenuOptions = [
            { id: 'Minit Mesyuarat', label: 'Minit Mesyuarat', icon: 'clipboard-list' },
            { id: 'Pekeliling/ SPI/PPSM', label: 'Pekeliling/ SPI/PPSM', icon: 'book-open' },
            { id: 'Lain-lain Hebahan', label: 'Lain-lain Hebahan', icon: 'megaphone' }
        ];

        let activeTab = "Semua";
        let activeSubTab = null;
        let searchQuery = "";

        // Elements
        const desktopNav = document.getElementById('desktop-nav');
        const mobileNav = document.getElementById('mobile-nav');
        const docGrid = document.getElementById('document-grid');
        const docCount = document.getElementById('doc-count');
        const billboard = document.getElementById('billboard');
        const subMenuContainer = document.getElementById('submenu-container');
        const searchInput = document.getElementById('search-input');
        const mobileMenuBtn = document.getElementById('mobile-menu-btn');

        function init() {
            renderNav();
            renderSubMenu();
            updateBillboard();
            renderDocuments();
            lucide.createIcons();
            
            searchInput.addEventListener('input', (e) => {
                searchQuery = e.target.value;
                renderDocuments();
            });

            mobileMenuBtn.addEventListener('click', () => {
                mobileNav.classList.toggle('hidden');
            });
        }

        function renderNav() {
            desktopNav.innerHTML = menuItems.map(item => `
                <button onclick="handleTabChange('${item}')" class="px-5 py-2.5 rounded-lg text-xs font-extrabold transition-all uppercase tracking-wider ${activeTab === item ? 'bg-[#0A3D62] text-white shadow-lg' : 'text-[#0A3D62] hover:bg-slate-100'}">
                    ${item}
                </button>
            `).join('');

            mobileNav.innerHTML = menuItems.map(item => `
                <button onclick="handleTabChange('${item}')" class="block w-full text-left px-5 py-4 rounded-xl text-sm font-black uppercase tracking-widest ${activeTab === item ? 'bg-[#0A3D62] text-white' : 'text-slate-600'}">
                    ${item}
                </button>
            `).join('');
        }

        function renderSubMenu() {
            subMenuContainer.innerHTML = subMenuOptions.map(opt => `
                <button onclick="handleSubTabChange('${opt.id}')" class="flex items-center justify-between p-7 rounded-[2rem] border-2 transition-all group ${activeSubTab === opt.id ? 'border-[#0A3D62] bg-white shadow-xl ring-1 ring-[#0A3D62]' : 'border-transparent bg-white shadow-sm hover:shadow-lg'}">
                    <div class="flex items-center space-x-5">
                        <div class="p-4 rounded-2xl ${activeSubTab === opt.id ? 'bg-[#0A3D62] text-white' : 'bg-slate-100 text-[#0A3D62] group-hover:bg-[#E74C3C] group-hover:text-white'}">
                            <i data-lucide="${opt.icon}" size="20"></i>
                        </div>
                        <span class="font-black text-xs text-left uppercase tracking-widest ${activeSubTab === opt.id ? 'text-[#0A3D62]' : 'text-slate-600'}">
                            ${opt.label}
                        </span>
                    </div>
                    <i data-lucide="chevron-right" size="20" class="${activeSubTab === opt.id ? 'text-[#E74C3C]' : 'text-slate-200'}"></i>
                </button>
            `).join('');
            lucide.createIcons();
        }

        function updateBillboard() {
            const latest = [...documents].sort((a, b) => new Date(b.date) - new Date(a.date))[0];
            const dateStr = new Date(latest.date).toLocaleDateString('ms-MY', { day: 'numeric', month: 'long', year: 'numeric' });
            
            billboard.innerHTML = `
                <div class="relative overflow-hidden rounded-[2.5rem] bg-gradient-to-br from-[#0A3D62] to-[#3C6382] text-white shadow-2xl">
                    <div class="relative z-10 p-10 md:p-16 flex flex-col md:flex-row md:items-center justify-between gap-10">
                        <div class="flex-1">
                            <div class="flex items-center space-x-3 mb-6">
                                <span class="px-4 py-1.5 bg-[#E74C3C] text-[10px] font-black rounded-full shadow-lg">TERKINI</span>
                                <span class="text-xs font-bold text-blue-100 uppercase tracking-widest">${latest.source}</span>
                            </div>
                            <h3 class="text-3xl md:text-5xl font-black mb-6 leading-tight">${latest.title}</h3>
                            <div class="flex items-center text-blue-100 font-bold bg-white/10 w-fit px-4 py-2 rounded-xl backdrop-blur-sm">
                                <i data-lucide="clock" size="18" class="mr-3 text-[#F6B93B]"></i>
                                <span class="text-sm">${dateStr}</span>
                            </div>
                        </div>
                        <button class="bg-[#F6B93B] text-[#0A3D62] px-10 py-5 rounded-2xl font-black shadow-xl hover:scale-105 transition-all flex items-center">
                            LIHAT DOKUMEN <i data-lucide="chevron-right" size="24" class="ml-2"></i>
                        </button>
                    </div>
                </div>
            `;
            lucide.createIcons();
        }

        function renderDocuments() {
            const filtered = documents.filter(doc => {
                const matchesTab = activeTab === "Semua" || doc.source === activeTab;
                const matchesSubTab = !activeSubTab || doc.type === activeSubTab;
                const matchesSearch = doc.title.toLowerCase().includes(searchQuery.toLowerCase());
                return matchesTab && matchesSubTab && matchesSearch;
            }).sort((a, b) => new Date(b.date) - new Date(a.date));

            docCount.textContent = `${filtered.length} DOKUMEN DIJUMPAI`;

            if (filtered.length === 0) {
                docGrid.innerHTML = `
                    <div class="col-span-full py-20 text-center opacity-40 italic font-bold">Tiada dokumen dijumpai...</div>
                `;
                return;
            }

            docGrid.innerHTML = filtered.map(doc => `
                <div class="bg-white p-8 rounded-[2.5rem] border border-slate-50 shadow-sm hover:shadow-2xl transition-all group">
                    <div class="flex items-center justify-between mb-6">
                        <span class="px-4 py-1.5 rounded-xl text-[10px] font-black uppercase tracking-widest border ${doc.source === 'KPM' ? 'bg-red-50 text-red-700 border-red-100' : 'bg-blue-50 text-blue-700 border-blue-100'}">
                            ${doc.source}
                        </span>
                        <span class="text-[10px] font-black text-slate-400 uppercase tracking-tighter">
                            ${new Date(doc.date).toLocaleDateString('ms-MY')}
                        </span>
                    </div>
                    <h4 class="text-xl font-black text-[#0A3D62] group-hover:text-[#E74C3C] mb-4 transition-colors">
                        ${doc.title}
                    </h4>
                    <div class="flex items-center text-[10px] font-black text-[#0A3D62] mb-6 bg-slate-100 px-4 py-2 rounded-xl w-fit uppercase">
                        ${doc.type}
                    </div>
                    <button class="flex items-center space-x-2 bg-[#0A3D62] text-white px-6 py-3 rounded-2xl hover:bg-[#E74C3C] transition-all font-black text-[10px] uppercase tracking-widest">
                        <span>BUKA FAIL</span>
                        <i data-lucide="external-link" size="16"></i>
                    </button>
                </div>
            `).join('');
            lucide.createIcons();
        }

        function handleTabChange(tab) {
            activeTab = tab;
            activeSubTab = null;
            mobileNav.classList.add('hidden');
            renderNav();
            renderSubMenu();
            renderDocuments();
        }

        function handleSubTabChange(sub) {
            activeSubTab = (activeSubTab === sub) ? null : sub;
            renderSubMenu();
            renderDocuments();
        }

        // Jalankan apabila DOM sedia
        document.addEventListener('DOMContentLoaded', init);
    </script>
</body>
</html>
