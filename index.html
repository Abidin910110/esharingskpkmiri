<!DOCTYPE html>
<html lang="ms">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>e-Sharing SK Pendidikan Khas Miri</title>
    
    <!-- Meta untuk PWA & Ikon Telefon/Laptop -->
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-title" content="e-Sharing">
    <link rel="apple-touch-icon" href="logo.jpg">
    <link rel="icon" type="image/jpeg" href="logo.jpg">

    <!-- Tailwind CSS CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;700;900&display=swap');
        body { font-family: 'Inter', sans-serif; }
        
        .logo-hover:hover {
            transform: scale(1.05);
            transition: all 0.3s ease;
        }
    </style>
</head>
<body class="bg-slate-50 text-slate-900">

    <div class="h-2 bg-[#F6B93B] w-full"></div>

    <header class="bg-white border-b border-slate-200 sticky top-0 z-50 shadow-sm">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
            <div class="flex justify-between items-center h-20">
                <div class="flex items-center space-x-4">
                    <div class="p-1 bg-white rounded-lg shadow-sm border border-slate-100 logo-hover">
                        <img src="logo.jpg" 
                             alt="Logo SK Pendidikan Khas Miri" 
                             class="h-14 w-14 object-contain rounded-md">
                    </div>
                    <div class="flex flex-col">
                        <h1 class="text-2xl font-[900] text-[#0A3D62] tracking-tight leading-none uppercase">e-Sharing</h1>
                        <div class="flex items-center mt-1 text-slate-500 font-bold uppercase tracking-widest text-[10px]">
                            <span class="h-[2px] w-4 bg-[#E74C3C] mr-2"></span>
                            SK Pendidikan Khas Miri
                        </div>
                    </div>
                </div>

                <nav id="desktop-nav" class="hidden lg:flex items-center space-x-1"></nav>

                <div class="lg:hidden">
                    <button id="mobile-menu-btn" class="p-2 text-[#0A3D62]">
                        <i data-lucide="menu" size="28"></i>
                    </button>
                </div>
            </div>
        </div>
        <div id="mobile-nav" class="hidden lg:hidden bg-white border-t border-slate-100 p-4 space-y-2 shadow-xl"></div>
    </header>

    <main class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-10">
        <section id="billboard" class="mb-12"></section>

        <!-- Submenu Section -->
        <section id="submenu-section" class="mb-12 hidden">
            <div class="flex items-center space-x-2 mb-4">
                <div class="h-px bg-slate-200 flex-1"></div>
                <span id="submenu-title" class="text-[10px] font-black text-slate-400 uppercase tracking-widest px-4">Kategori Dokumen</span>
                <div class="h-px bg-slate-200 flex-1"></div>
            </div>
            <div class="grid grid-cols-2 sm:grid-cols-3 lg:grid-cols-6 gap-4" id="submenu-container"></div>
        </section>

        <div class="relative mb-12">
            <i data-lucide="search" class="absolute left-5 top-1/2 -translate-y-1/2 text-slate-400" size="20"></i>
            <input type="text" id="search-input" placeholder="Cari dokumen..." 
                   class="w-full pl-14 pr-6 py-5 rounded-2xl bg-white border border-slate-100 shadow-sm focus:ring-2 focus:ring-[#0A3D62]/10 outline-none font-bold text-slate-700">
        </div>

        <div class="space-y-6">
            <div class="flex items-center justify-between px-2 mb-2">
                <h3 class="font-[900] text-[#0A3D62] uppercase tracking-[0.1em] text-lg italic">ARKIB DOKUMEN DIGITAL</h3>
                <span id="doc-count" class="px-5 py-1.5 bg-[#F6B93B] rounded-full text-[10px] font-black text-[#0A3D62] shadow-sm uppercase">0 ITEM</span>
            </div>
            <div id="document-grid" class="grid grid-cols-1 md:grid-cols-2 gap-8"></div>
        </div>
    </main>

    <footer class="bg-[#0A3D62] py-16 mt-20 text-white text-center border-t-4 border-[#F6B93B]">
        <div class="max-w-7xl mx-auto px-4 flex flex-col items-center">
            <div class="bg-white p-2 rounded-2xl mb-6 shadow-2xl">
                <img src="logo.jpg" alt="Logo Sekolah" class="h-16 w-16">
            </div>
            <h4 class="text-xl font-[900] uppercase italic tracking-tighter">e-Sharing SKPK Miri</h4>
            <p class="text-blue-100/50 text-xs font-bold mt-2 uppercase tracking-widest">"Bersatu Berdikari"</p>
        </div>
    </footer>

    <script>
        const documents = [
            { id: 1, title: "Pekeliling Ikhtisas Bil. 5/2024 - Kurikulum Kebangsaan", source: "KPM", type: "Pekeliling/ SPI/PPSM", date: "2024-05-10T09:00:00" },
            { id: 2, title: "Panduan Pengurusan MBPK Berkeperluan Khas", source: "BPKHAS", type: "Pekeliling/ SPI/PPSM", date: "2024-05-12T14:30:00" },
            { id: 3, title: "Minit Mesyuarat Dialog Prestasi PPD Miri", source: "PPD", type: "Minit Mesyuarat", date: "2024-05-13T10:15:00" },
            { id: 4, title: "Hebahan Cuti Peristiwa Negeri Sarawak", source: "JPN", type: "Lain-lain Hebahan", date: "2024-05-11T08:00:00" },
            { id: 5, title: "Program Kebajikan Staf SKPK Miri", source: "LAIN-LAIN", type: "Lain-lain Hebahan", date: "2024-05-09T16:45:00" },
            { id: 6, title: "Minit Mesyuarat Pengurusan Sekolah Bil 1", source: "KPM", type: "Minit Mesyuarat", date: "2024-05-08T10:00:00" },
            { id: 7, title: "MySG Sekolah Rendah Versi 2024", source: "Rujukan Pengoperasian", type: "Mysg Sekolah Rendah", date: "2024-05-14T08:00:00" },
            { id: 8, title: "Kod Amalan Pendidikan MBPK", source: "Rujukan Pengoperasian", type: "Kod Amalan MBPK", date: "2024-05-15T09:00:00" },
            { id: 9, title: "Pelan Operasi Sekolah SKPK Miri 2024/2025", source: "Rujukan Pengoperasian", type: "Pelan Operasi Sekolah", date: "2024-05-16T10:00:00" },
            { id: 10, title: "Minit Mesyuarat Guru Bil 2/2024", source: "SEKOLAH", type: "Minit Mesyuarat", date: "2024-05-17T09:00:00" }
        ];

        // Menu SEKOLAH ditambah dalam menuItems
        const menuItems = ["Semua", "KPM", "BPKHAS", "JPN", "PPD", "SEKOLAH", "Rujukan Pengoperasian", "LAIN-LAIN"];
        
        const agencySubMenu = [
            { id: 'Minit Mesyuarat', label: 'Minit Mesyuarat', icon: 'clipboard-list' },
            { id: 'Pekeliling/ SPI/PPSM', label: 'Pekeliling/ SPI/PPSM', icon: 'book-open' },
            { id: 'Lain-lain Hebahan', label: 'Lain-lain Hebahan', icon: 'megaphone' }
        ];

        const operationSubMenu = [
            { id: 'Mysg Sekolah Rendah', label: 'Mysg Sekolah Rendah', icon: 'file-text' },
            { id: 'Kod Amalan MBPK', label: 'Kod Amalan MBPK', icon: 'shield-check' },
            { id: 'RPI', label: 'RPI', icon: 'user-cog' },
            { id: 'PAPR', label: 'PAPR', icon: 'layout' },
            { id: 'SK@S', label: 'SK@S', icon: 'star' },
            { id: 'Pelan Operasi Sekolah', label: 'Pelan Operasi Sekolah', icon: 'map' }
        ];

        let activeTab = "Semua";
        let activeSubTab = null;
        let searchQuery = "";

        const desktopNav = document.getElementById('desktop-nav');
        const mobileNav = document.getElementById('mobile-nav');
        const docGrid = document.getElementById('document-grid');
        const docCount = document.getElementById('doc-count');
        const billboard = document.getElementById('billboard');
        const subMenuSection = document.getElementById('submenu-section');
        const subMenuContainer = document.getElementById('submenu-container');
        const searchInput = document.getElementById('search-input');
        const mobileMenuBtn = document.getElementById('mobile-menu-btn');
        const submenuTitle = document.getElementById('submenu-title');

        function init() {
            renderNav();
            renderSubMenu();
            updateBillboard();
            renderDocuments();
            
            searchInput.addEventListener('input', (e) => {
                searchQuery = e.target.value;
                renderDocuments();
            });

            mobileMenuBtn.addEventListener('click', () => {
                mobileNav.classList.toggle('hidden');
            });
        }

        function renderNav() {
            desktopNav.innerHTML = menuItems.map(item => `
                <button onclick="handleTabChange('${item}')" class="px-3 py-2.5 rounded-lg text-[10px] font-[900] transition-all uppercase tracking-wider ${activeTab === item ? 'bg-[#0A3D62] text-white shadow-lg' : 'text-[#0A3D62] hover:bg-slate-100'}">
                    ${item}
                </button>
            `).join('');

            mobileNav.innerHTML = menuItems.map(item => `
                <button onclick="handleTabChange('${item}')" class="block w-full text-left px-5 py-4 rounded-xl text-sm font-black uppercase tracking-widest ${activeTab === item ? 'bg-[#0A3D62] text-white' : 'text-slate-600'}">
                    ${item}
                </button>
            `).join('');
        }

        function renderSubMenu() {
            // "SEKOLAH" kini termasuk dalam syarat untuk memaparkan agencySubMenu
            const isAgency = ["KPM", "BPKHAS", "JPN", "PPD", "SEKOLAH", "LAIN-LAIN"].includes(activeTab);
            const isOperation = activeTab === "Rujukan Pengoperasian";
            
            if (isAgency || isOperation) {
                subMenuSection.classList.remove('hidden');
                const options = isOperation ? operationSubMenu : agencySubMenu;
                submenuTitle.textContent = isOperation ? "Navigasi Pengoperasian" : "Kategori Dokumen";
                
                subMenuContainer.innerHTML = options.map(opt => `
                    <button onclick="handleSubTabChange('${opt.id}')" class="flex flex-col items-center justify-center p-4 rounded-2xl border-2 transition-all group ${activeSubTab === opt.id ? 'border-[#0A3D62] bg-white shadow-md' : 'border-transparent bg-white shadow-sm hover:shadow-md'}">
                        <div class="p-3 rounded-xl mb-2 ${activeSubTab === opt.id ? 'bg-[#0A3D62] text-white' : 'bg-slate-100 text-[#0A3D62] group-hover:bg-[#E74C3C] group-hover:text-white'}">
                            <i data-lucide="${opt.icon}" size="18"></i>
                        </div>
                        <span class="font-black text-[8px] sm:text-[9px] text-center uppercase tracking-tighter ${activeSubTab === opt.id ? 'text-[#0A3D62]' : 'text-slate-600'}">
                            ${opt.label}
                        </span>
                    </button>
                `).join('');
            } else {
                subMenuSection.classList.add('hidden');
            }
            lucide.createIcons();
        }

        function updateBillboard() {
            const latest = [...documents].sort((a, b) => new Date(b.date) - new Date(a.date))[0];
            const dateStr = new Date(latest.date).toLocaleDateString('ms-MY', { day: 'numeric', month: 'long', year: 'numeric' });
            
            billboard.innerHTML = `
                <div class="relative overflow-hidden rounded-[2.5rem] bg-gradient-to-br from-[#0A3D62] to-[#3C6382] text-white shadow-2xl">
                    <div class="relative z-10 p-10 md:p-16 flex flex-col md:flex-row md:items-center justify-between gap-10">
                        <div class="flex-1">
                            <div class="flex items-center space-x-3 mb-6">
                                <span class="px-4 py-1.5 bg-[#E74C3C] text-[10px] font-black rounded-full shadow-lg border border-red-400 uppercase tracking-widest">TERKINI</span>
                                <span class="text-xs font-bold text-blue-100 uppercase tracking-widest">${latest.source}</span>
                            </div>
                            <h3 class="text-3xl md:text-5xl font-black mb-6 leading-tight">${latest.title}</h3>
                            <div class="flex items-center text-blue-100 font-bold bg-white/10 w-fit px-4 py-2 rounded-xl backdrop-blur-sm">
                                <i data-lucide="clock" size="18" class="mr-3 text-[#F6B93B]"></i>
                                <span class="text-sm">${dateStr}</span>
                            </div>
                        </div>
                        <button class="bg-[#F6B93B] text-[#0A3D62] px-10 py-5 rounded-2xl font-black shadow-xl hover:scale-105 transition-all flex items-center uppercase text-sm tracking-tighter">
                            BUKA FAIL <i data-lucide="chevron-right" size="24" class="ml-2"></i>
                        </button>
                    </div>
                </div>
            `;
            lucide.createIcons();
        }

        function renderDocuments() {
            const filtered = documents.filter(doc => {
                const matchesTab = activeTab === "Semua" || doc.source === activeTab;
                const matchesSubTab = !activeSubTab || doc.type === activeSubTab;
                const matchesSearch = doc.title.toLowerCase().includes(searchQuery.toLowerCase());
                return matchesTab && matchesSubTab && matchesSearch;
            }).sort((a, b) => new Date(b.date) - new Date(a.date));

            docCount.textContent = `${filtered.length} ITEM DIJUMPAI`;

            if (filtered.length === 0) {
                docGrid.innerHTML = `
                    <div class="col-span-full py-20 text-center opacity-40 italic font-bold">
                        <i data-lucide="search-x" class="mx-auto mb-4" size="48"></i>
                        Tiada rekod ditemukan untuk carian anda...
                    </div>
                `;
                lucide.createIcons();
                return;
            }

            docGrid.innerHTML = filtered.map(doc => {
                let typeIcon = 'file-text';
                if(doc.type.includes('Minit')) typeIcon = 'clipboard-list';
                else if(doc.type.includes('Pekeliling')) typeIcon = 'book-open';
                else if(doc.type.includes('Hebahan')) typeIcon = 'megaphone';
                else if(doc.type.includes('Kod Amalan')) typeIcon = 'shield-check';
                else if(doc.type.includes('RPI')) typeIcon = 'user-cog';
                else if(doc.type.includes('Pelan Operasi')) typeIcon = 'map';

                return `
                <div class="bg-white p-8 rounded-[2.5rem] border border-slate-50 shadow-sm hover:shadow-2xl transition-all group">
                    <div class="flex items-center justify-between mb-6">
                        <span class="px-4 py-1.5 rounded-xl text-[10px] font-black uppercase tracking-widest border ${doc.source === 'KPM' ? 'bg-red-50 text-red-700 border-red-100' : 'bg-blue-50 text-blue-700 border-blue-100'}">
                            ${doc.source}
                        </span>
                        <span class="text-[10px] font-black text-slate-400 uppercase tracking-tighter">
                            ${new Date(doc.date).toLocaleDateString('ms-MY')}
                        </span>
                    </div>
                    <h4 class="text-xl font-[900] text-[#0A3D62] group-hover:text-[#E74C3C] mb-4 transition-colors leading-tight">
                        ${doc.title}
                    </h4>
                    <div class="flex items-center text-[10px] font-black text-[#0A3D62] mb-6 bg-slate-100 px-4 py-2 rounded-xl w-fit uppercase tracking-wider">
                        <i data-lucide="${typeIcon}" size="14" class="mr-2"></i>
                        ${doc.type}
                    </div>
                    <button class="flex items-center space-x-2 bg-[#0A3D62] text-white px-6 py-3 rounded-2xl hover:bg-[#E74C3C] transition-all font-black text-[10px] uppercase tracking-widest shadow-lg active:scale-95">
                        <span>Papar Arkib</span>
                        <i data-lucide="external-link" size="16"></i>
                    </button>
                </div>
            `}).join('');
            
            lucide.createIcons();
        }

        function handleTabChange(tab) {
            activeTab = tab;
            activeSubTab = null; 
            mobileNav.classList.add('hidden');
            renderNav();
            renderSubMenu();
            renderDocuments();
        }

        function handleSubTabChange(sub) {
            activeSubTab = (activeSubTab === sub) ? null : sub;
            renderSubMenu();
            renderDocuments();
        }

        document.addEventListener('DOMContentLoaded', init);
    </script>
</body>
</html>
