        function updateBillboard() {

        function renderDocuments() {
            const filtered = documents.filter(doc => {
                const matchesTab = activeTab === "Semua" || doc.source === activeTab;
                const matchesSubTab = !activeSubTab || doc.type === activeSubTab;
                const matchesSearch = doc.title.toLowerCase().includes(searchQuery.toLowerCase());
                return matchesTab && matchesSubTab && matchesSearch;
            }).sort((a, b) => new Date(b.date) - new Date(a.date));

            docCount.textContent = `${filtered.length} Item Dijumpai`;
            
            // Set Tajuk Senarai Mengikut Status Penapis
            const listTitle = document.getElementById('list-title');
            if (activeTab !== "Semua") {
                listTitle.textContent = `Dokumen ${activeTab} ${activeSubTab ? `› ${activeSubTab}` : ''}`;
            } else {
                listTitle.textContent = "Senarai Dokumen Rasmi";
            }

            if (filtered.length === 0) {
                docGrid.innerHTML = `
                    <div class="col-span-full py-20 text-center bg-white rounded-[2.5rem] border border-slate-200/60 shadow-sm">
                        <div class="max-w-xs mx-auto flex flex-col items-center">
                            <div class="p-4 bg-slate-100 text-slate-400 rounded-full mb-4">
                                <i data-lucide="folder-open" size="32"></i>
                            </div>
                            <p class="text-slate-400 font-bold text-xs uppercase tracking-wider italic">Tiada rekod dokumen dijumpai...</p>
                        </div>
                    </div>
                `;
                return;
            }

            docGrid.innerHTML = filtered.map(doc => {
                let typeIcon = 'file-text';
                if(doc.type.includes('Minit')) typeIcon = 'clipboard-list';
                else if(doc.type.includes('Pekeliling')) typeIcon = 'book-open';
                else if(doc.type.includes('Hebahan') || doc.type === 'Lain-lain Hebahan' || doc.type === 'Surat Kebenaran') typeIcon = 'megaphone';
                else if(doc.type.includes('Garis Panduan') || doc.type === 'GARIS PANDUAN PAPR') typeIcon = 'scroll';
                else if(doc.type.includes('RPM')) typeIcon = 'trending-up';
                else if(doc.type.includes('RPI')) typeIcon = 'user-cog';
                else if(doc.type.includes('PAPR') || doc.type === 'GARIS PANDUAN PAPR') typeIcon = 'layout';
                else if(doc.type.includes('SK@S') || doc.type === 'PANDUAN PELAKSANAAN SK@S') typeIcon = 'star';
                else if(doc.type.includes('Pelan Operasi') || doc.type === 'PEMANTAPAN PENGURUSAN KURIKULUM DAN PBS') typeIcon = 'map';
                else if(doc.type.includes('MATRIKS')) typeIcon = 'award';
                else if(doc.type.includes('DIGITAL') || doc.type === 'DASAR PENDIDIKAN DIGITAL') typeIcon = 'monitor';
                else if(doc.type === 'Rujukan' || doc.type === 'Buku') typeIcon = 'book';

                let viewAction = ``;
                if (pautanKhas[doc.title]) {
                    viewAction = `onclick="window.open('${pautanKhas[doc.title]}', '_blank')"`;
                } else if (pautanKhas[doc.type]) {
                    viewAction = `onclick="window.open('${pautanKhas[doc.type]}', '_blank')"`;
                } else if (doc.source === 'PPD' && doc.type === 'Lain-lain Hebahan') {
                    viewAction = `onclick="window.open('${pautanKhas['PEMANTAPAN PENGURUSAN KURIKULUM DAN PBS']}', '_blank')"`;
                } else {
                    viewAction = `onclick="window.open('https://drive.google.com', '_blank')"`;
                }

                // Highlight teks carian sekiranya ada
                let highlightedTitle = doc.title;
                if (searchQuery.trim().length > 0) {
                    const regex = new RegExp(`(${searchQuery})`, 'gi');
                    highlightedTitle = doc.title.replace(regex, `<mark class="bg-yellow-200 text-slate-900 rounded px-1">$1</mark>`);
                }

                return `
                <div class="bg-white p-5 sm:p-7 rounded-[2rem] border border-slate-200/80 shadow-sm hover:shadow-xl hover:border-slate-300 smooth-transition flex flex-col h-full animate-fade-in">
                    <div class="flex items-center justify-between mb-4">
                        <span class="px-3 py-1.5 bg-slate-100 text-[var(--primary)] border border-slate-200 rounded-lg text-[9px] font-black uppercase tracking-wider shrink-0">
                            ${doc.source}
                        </span>
                        <span class="text-[9px] sm:text-[10px] font-bold text-slate-400 uppercase tracking-wider shrink-0">
                            ${new Date(doc.date).toLocaleDateString('ms-MY')}
                        </span>
                    </div>
                    
                    <h4 class="text-xs sm:text-sm font-bold text-slate-800 group-hover:text-[var(--primary)] mb-4 leading-snug flex-grow transition-colors smooth-transition break-words hyphens-auto">
                        ${highlightedTitle}
                    </h4>
                    
                    <div class="flex items-center text-[9px] font-black text-slate-400 mb-5 uppercase tracking-wider min-w-0">
                        <i data-lucide="${typeIcon}" size="14" class="mr-2 text-[var(--secondary)] shrink-0"></i>
                        <span class="truncate">${doc.type}</span>
                    </div>
                    
                    <button ${viewAction} class="w-full flex items-center justify-center space-x-2 bg-slate-100 text-[var(--primary)] hover:bg-[var(--primary)] hover:text-white border border-slate-200/60 py-3.5 rounded-xl smooth-transition font-bold text-[9px] sm:text-[10px] uppercase tracking-widest active:scale-95 shadow-sm shrink-0">
                        <span>Lihat Arkib</span>
                        <i data-lucide="chevron-right" size="14"></i>
                    </button>
                </div>
                `;
            }).join('');
            
            lucide.createIcons();
        }

        function handleTabChange(tab) {
            activeTab = tab;
            activeSubTab = null; 
            
            mobileNav.classList.add('hidden');
            menuIcon.setAttribute('data-lucide', 'menu');
            renderNav();
            renderSubMenu();
            renderDocuments();
            
            window.scrollTo({ top: 0, behavior: 'smooth' });
        }

        function handleSubTabChange(sub) {
            activeSubTab = (activeSubTab === sub) ? null : sub;
            renderSubMenu();
            renderDocuments();
        }

        document.addEventListener('DOMContentLoaded', init);
